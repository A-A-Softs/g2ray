name: VLESS via IP-SNI

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl gh uuid-runtime jq

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat << 'EOF' >> ~/.ssh/config
          Host *.ssh.github.com
            User codespace
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            LogLevel ERROR
          EOF

      - name: Authenticate with GitHub
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh auth status || gh auth login --with-token <<< "${{ secrets.PAT_TOKEN }}"

      - name: Generate unique files and update fork
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          UUID=$(uuidgen)
          NAME="g2ray-$(date +%s | sha256sum | base64 | head -c 6)"
          REPO="A-A-Softs/g2ray"
          BRANCH="master"
          IP="94.130.50.12"   # main Codespaces ingress IP

          # -------------------------------------------------
          # Helper function to update/create a file via API
          # -------------------------------------------------
          upsert_file() {
            local path="$1"
            local content="$2"
            local sha=$(gh api "repos/$REPO/contents/$path?ref=$BRANCH" --jq '.sha' 2>/dev/null || echo "")
            local payload=$(jq -n --arg msg "Update $path" --arg content "$content" --arg branch "$BRANCH" \
                             '{message: $msg, content: ($content | @base64), branch: $branch}')
            if [ -n "$sha" ]; then
              payload=$(echo "$payload" | jq --arg sha "$sha" '. + {sha: $sha}')
            fi
            gh api -X PUT "repos/$REPO/contents/$path" --input - <<< "$payload" > /dev/null
            echo "Updated $path"
          }

          # ---- file contents ----
          CONFIG_JSON=$(cat << XEOF
          {
            "log": { "loglevel": "warning", "access": "none", "error": "/tmp/xray-error.log" },
            "dns": {
              "servers": [
                { "address": "https://1.1.1.1/dns-query", "domains": ["geosite:geolocation-!cn"], "queryStrategy": "UseIP" },
                "8.8.8.8",
                "localhost"
              ],
              "queryStrategy": "UseIPv4"
            },
            "inbounds": [{
              "tag": "vless-in",
              "port": 443,
              "listen": "0.0.0.0",
              "protocol": "vless",
              "settings": {
                "clients": [{ "id": "$UUID", "flow": "", "level": 0, "email": "user@$NAME" }],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "xhttp",
                "security": "none",
                "xhttpSettings": { "mode": "packet-up", "path": "/", "maxUploadSize": 1000000, "maxConcurrentUploads": 10 }
              },
              "sniffing": { "enabled": true, "destOverride": ["http", "tls", "quic"], "routeOnly": false }
            }],
            "outbounds": [
              { "tag": "direct", "protocol": "freedom", "settings": { "domainStrategy": "UseIPv4" } },
              { "tag": "block", "protocol": "blackhole", "settings": { "response": { "type": "http" } } }
            ],
            "routing": {
              "domainStrategy": "IPIfNonMatch",
              "rules": [
                { "type": "field", "ip": ["geoip:private"], "outboundTag": "block" },
                { "type": "field", "protocol": ["bittorrent"], "outboundTag": "block" },
                { "type": "field", "domain": ["geosite:category-ads-all"], "outboundTag": "block" }
              ]
            },
            "policy": {
              "levels": {
                "0": { "handshake": 4, "connIdle": 300, "uplinkOnly": 2, "downlinkOnly": 5, "bufferSize": 512 }
              }
            }
          }
          XEOF
          )

          SETUP_SH='#!/bin/sh
          set -e
          RELEASE="https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip"
          TMPDIR="$(mktemp -d)"
          echo "[g2ray] Downloading Xray v26.3.27..."
          curl -sL "$RELEASE" -o "$TMPDIR/xray.zip"
          unzip -q "$TMPDIR/xray.zip" -d "$TMPDIR"
          install -m 755 "$TMPDIR/xray" /usr/local/bin/xray
          echo "[g2ray] Downloading GeoIP and GeoSite..."
          curl -sL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" -o /usr/local/bin/geoip.dat
          curl -sL "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" -o /usr/local/bin/geosite.dat
          rm -rf "$TMPDIR"
          echo "[g2ray] Done."'

          DOCKERFILE="FROM debian:bookworm-slim
          COPY setup.sh /tmp/setup.sh
          COPY config.json /etc/xray/g2ray.json
          COPY show-link.sh /usr/local/bin/show-link.sh
          COPY start.sh /usr/local/bin/start.sh
          RUN apt-get update \
              && apt-get install -y --no-install-recommends \
                 bash curl wget unzip ca-certificates openssl uuid-runtime tmux \
              && rm -rf /var/lib/apt/lists/* \
              && mkdir -p /etc/xray \
              && chmod +x /tmp/setup.sh \
              && /tmp/setup.sh \
              && rm /tmp/setup.sh \
              && chmod +x /usr/local/bin/show-link.sh \
              && chmod +x /usr/local/bin/start.sh
          EXPOSE 443
          CMD [\"/usr/local/bin/xray\",\"run\",\"-c\",\"/etc/xray/g2ray.json\"]"

          DEVCON_JSON=$(cat << XEOF
          {
            "name": "$NAME",
            "build": { "dockerfile": "Dockerfile", "context": "." },
            "features": {
              "ghcr.io/devcontainers/features/common-utils:2": { "installZsh": false },
              "ghcr.io/devcontainers/features/github-cli:1": { "version": "latest" }
            },
            "postAttachCommand": "gh codespace ports visibility 443:public -c $CODESPACE_NAME && bash /usr/local/bin/start.sh",
            "portsAttributes": {
              "443": { "label": "$NAME", "protocol": "http", "onAutoForward": "silent" }
            },
            "forwardPorts": [443],
            "hostRequirements": { "cpus": 2 }
          }
          XEOF
          )

          SHOWLINK_SH=$(cat << 'XEOF'
          #!/bin/bash
          CONFIG="/etc/xray/g2ray.json"
          UUID=$(grep -o '"id": *"[^"]*"' "$CONFIG" | head -1 | grep -o '"[^"]*"$' | tr -d '"')
          if [ -z "$UUID" ]; then echo "[g2ray] UUID پیدا نشد."; exit 1; fi
          SNI="${CODESPACE_NAME}-443.app.github.dev"
          LINK="vless://${UUID}@94.130.50.12:443?encryption=none&security=tls&sni=${SNI}&host=${SNI}&fp=chrome&allowInsecure=1&type=xhttp&mode=packet-up&path=%2F#$NAME"
          echo ""
          echo "================================================"
          echo "  $LINK"
          echo "================================================"
          echo ""
          XEOF
          )

          START_SH=$(cat << 'XEOF'
          #!/bin/bash
          # g2ray start script
          tmux kill-session -t g2ray 2>/dev/null || true
          tmux new-session -d -s g2ray
          tmux send-keys -t g2ray "sudo /usr/local/bin/xray run -c /etc/xray/g2ray.json &>/tmp/xray.log" Enter
          sleep 2
          show-link.sh
          echo "[g2ray] سرور داخل tmux اجرا شد"
          XEOF
          )

          # Update all files
          upsert_file ".devcontainer/config.json" "$CONFIG_JSON"
          upsert_file ".devcontainer/setup.sh" "$SETUP_SH"
          upsert_file ".devcontainer/Dockerfile" "$DOCKERFILE"
          upsert_file ".devcontainer/devcontainer.json" "$DEVCON_JSON"
          upsert_file ".devcontainer/show-link.sh" "$SHOWLINK_SH"
          upsert_file ".devcontainer/start.sh" "$START_SH"

          echo "UUID=$UUID"
          echo "Files updated."

      - name: Create Codespace
        id: create
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO="A-A-Softs/g2ray"
          gh codespace create -R "$REPO" -b master --machine basicLinux32gb > create.log 2>&1
          cat create.log
          CODESPACE_NAME=$(tail -1 create.log | tr -d '[:space:]')
          if [ -z "$CODESPACE_NAME" ]; then
            sleep 30
            CODESPACE_NAME=$(gh codespace list --repo "$REPO" --json name -q '.[0].name')
          fi
          echo "codespace_name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV

      - name: Wait for Codespace and get link
        if: env.CODESPACE_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CODESPACE="${{ env.CODESPACE_NAME }}"
          echo "Waiting for Codespace $CODESPACE to be ready..."
          for i in {1..20}; do
            STATE=$(gh codespace list --repo "A-A-Softs/g2ray" --json name,state -q ".[] | select(.name==\"$CODESPACE\") | .state")
            if [ "$STATE" = "Available" ]; then echo "Ready!"; break; fi
            sleep 15
          done

          # Wait a little more for Xray to start
          echo "Waiting 30 seconds for Xray and port visibility..."
          sleep 30

          echo "Extracting VLESS link..."
          gh codespace ssh -c "$CODESPACE" -- "bash show-link.sh" 2>&1 | tee link.txt
          LINK=$(grep -o 'vless://[^ ]*' link.txt)
          echo "VLESS link: $LINK"
          echo "$LINK" > vless-link.txt
          echo "### VLESS Config:" >> $GITHUB_STEP_SUMMARY
          echo "$LINK" >> $GITHUB_STEP_SUMMARY

      - name: Output final link
        if: env.CODESPACE_NAME != ''
        run: |
          echo "### Final VLESS Config:"
          cat vless-link.txt
