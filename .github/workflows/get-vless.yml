name: Get VLESS Config from Codespace

on:
  workflow_dispatch:

jobs:
  get-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y)

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/id_ed25519.pub
          cat << EOF >> ~/.ssh/config
          Host *.ssh.github.com
            User codespace
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            LogLevel ERROR
          EOF

      - name: Authenticate with GitHub
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh auth status || gh auth login --with-token <<< "${{ secrets.PAT_TOKEN }}"
          echo "SSH key already added manually – skipping gh ssh-key add."

      - name: Create Codespace
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set +e
          REPO="A-A-Softs/g2ray"
          echo "Creating Codespace for $REPO on master with basicLinux32gb..."
          gh codespace create -R "$REPO" -b master --machine basicLinux32gb > create.log 2>&1
          CREATE_EXIT_CODE=$?
          set -e
          echo "Exit code: $CREATE_EXIT_CODE"
          cat create.log
          if [ $CREATE_EXIT_CODE -ne 0 ]; then
            echo "FAILED: Codespace creation error."
            exit 1
          fi
          CODESPACE_NAME=$(tail -1 create.log | tr -d '[:space:]')
          if [ -z "$CODESPACE_NAME" ]; then
            echo "Fallback: waiting and listing..."
            sleep 30
            CODESPACE_TEMP=$(gh codespace list --repo "$REPO" --json name -q '.[0].name')
            CODESPACE_NAME=$CODESPACE_TEMP
          fi
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV

      - name: Generate UUID and run install.sh
        if: env.CODESPACE_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CODESPACE_NAME="${{ env.CODESPACE_NAME }}"
          REPO="${{ env.REPO }}"

          # Generate a proper UUID on the Actions runner
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "Generated UUID: $UUID"

          echo "Waiting for Codespace $CODESPACE_NAME to become ready..."
          for i in {1..20}; do
            STATE=$(gh codespace list --repo "$REPO" --json name,state -q ".[] | select(.name==\"$CODESPACE_NAME\") | .state")
            if [ "$STATE" = "Available" ]; then
              echo "Ready!"
              break
            fi
            echo "State: $STATE – waiting 15s..."
            sleep 15
          done
          if [ "$STATE" != "Available" ]; then
            echo "Codespace not ready."
            exit 1
          fi

          echo "Running install.sh with predefined UUID..."
          gh codespace ssh -c "$CODESPACE_NAME" -- "export UUID='$UUID'; export GH_TOKEN=${{ secrets.PAT_TOKEN }}; find /workspaces -name install.sh -execdir bash {} \;" 2>&1 | tee install-output.txt

          # Wait a moment for the service to start
          sleep 5

          # If the script didn't use our UUID, force it into config.json
          echo "Ensuring config.json contains our UUID..."
          gh codespace ssh -c "$CODESPACE_NAME" -- "find /workspaces -name config.json -exec sed -i 's/\"id\": *\"[^\"]*\"/\"id\": \"$UUID\"/' {} \;"

          # Restart xray to pick up the new UUID (if running)
          gh codespace ssh -c "$CODESPACE_NAME" -- "pkill xray || true; sleep 1; cd /workspaces/g2ray && nohup ./xray run config.json > /dev/null 2>&1 &" 2>&1 || echo "Service restart attempted"

          # Construct the link
          VLESS_LINK="vless://${UUID}@${CODESPACE_NAME}-443.preview.app.github.dev:443?encryption=none&security=none&type=ws&path=/ws#g2ray"
          echo "VLESS link: $VLESS_LINK"
          echo "$VLESS_LINK" > vless-link.txt
          echo "### VLESS Config Link:" >> $GITHUB_STEP_SUMMARY
          echo "$VLESS_LINK" >> $GITHUB_STEP_SUMMARY

      - name: Output VLESS link
        if: env.CODESPACE_NAME != ''
        run: |
          echo "### Final VLESS Config Link:"
          cat vless-link.txt
