name: Just Create CodeSpace and Get Link

on:
  workflow_dispatch:

jobs:
  get-link:
    runs-on: ubuntu-latest
    steps:
      - name: Install gh
        run: |
          type -p gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update && sudo apt install -y gh)

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat << 'EOF' >> ~/.ssh/config
          Host *.ssh.github.com
            User codespace
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            LogLevel ERROR
          EOF

      - name: Auth
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh auth status || gh auth login --with-token <<< "${{ secrets.PAT_TOKEN }}"

      - name: Create Codespace
        id: create
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO="A-A-Softs/g2ray"
          echo "Creating Codespace for $REPO..."
          gh codespace create -R "$REPO" -b master --machine basicLinux32gb -v 2>&1 | tee create.log
          CODESPACE_NAME=$(tail -1 create.log | tr -d '[:space:]')
          if [ -z "$CODESPACE_NAME" ]; then
            echo "Waiting 30s and retrying..."
            sleep 30
            CODESPACE_NAME=$(gh codespace list --repo "$REPO" --json name -q '.[0].name')
          fi
          echo "codespace_name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV

      - name: Wait, public port, and start Xray
        if: env.CODESPACE_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CODESPACE="${{ env.CODESPACE_NAME }}"
          echo "Waiting for Codespace $CODESPACE..."
          for i in {1..20}; do
            STATE=$(gh codespace list --repo "A-A-Softs/g2ray" --json name,state -q ".[] | select(.name==\"$CODESPACE\") | .state")
            if [ "$STATE" = "Available" ]; then echo "Ready!"; break; fi
            sleep 15
          done

          # Make port public
          echo "Making port 443 public..."
          gh codespace ports visibility 443:public -c "$CODESPACE" --repo "A-A-Softs/g2ray" || echo "Could not make port public (maybe already public)"

          # Start Xray
          echo "Starting Xray..."
          gh codespace ssh -c "$CODESPACE" -- "bash /usr/local/bin/start.sh"

          # Extract UUID from config inside Codespace
          UUID=$(gh codespace ssh -c "$CODESPACE" -- "grep -oP '(?<=\"id\": \")[^\"]+' /etc/xray/g2ray.json" 2>/dev/null)
          if [ -z "$UUID" ]; then
            echo "Failed to get UUID from Codespace. Using fallback (manual input needed)."
            UUID="YOUR_UUID_HERE"
          fi

          SNI="${CODESPACE}-443.app.github.dev"
          VLESS_LINK="vless://${UUID}@94.130.50.12:443?encryption=none&security=tls&sni=${SNI}&host=${SNI}&fp=chrome&allowInsecure=1&type=xhttp&mode=packet-up&path=%2F#g2ray"
          echo "VLESS link: $VLESS_LINK"
          echo "$VLESS_LINK" > vless-link.txt
          echo "### VLESS Config:" >> $GITHUB_STEP_SUMMARY
          echo "$VLESS_LINK" >> $GITHUB_STEP_SUMMARY

      - name: Output final link
        if: env.CODESPACE_NAME != ''
        run: |
          echo "### Final VLESS Config:"
          cat vless-link.txt
