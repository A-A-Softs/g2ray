name: Create and Get VLESS

on:
  workflow_dispatch:

jobs:
  create-and-get:
    runs-on: ubuntu-latest
    steps:
      - name: Install gh
        run: |
          type -p gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update && sudo apt install -y gh)

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat << 'EOF' >> ~/.ssh/config
          Host *.ssh.github.com
            User codespace
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            LogLevel ERROR
          EOF

      - name: Auth
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh auth status || gh auth login --with-token <<< "${{ secrets.PAT_TOKEN }}"

      - name: Create Codespace
        id: create
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO="A-A-Softs/g2ray"
          echo "Creating Codespace..."
          gh codespace create -R "$REPO" -b master --machine basicLinux32gb | tee create.log
          CODESPACE_NAME=$(tail -1 create.log | tr -d '[:space:]')
          if [ -z "$CODESPACE_NAME" ]; then
            echo "No codespace name detected, waiting and listing..."
            sleep 30
            CODESPACE_NAME=$(gh codespace list --repo "$REPO" --json name -q '.[0].name')
          fi
          echo "codespace_name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV

      - name: Wait, public port, start Xray, and get link
        if: env.CODESPACE_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CODESPACE="${{ env.CODESPACE_NAME }}"
          echo "Waiting for $CODESPACE to be ready..."
          for i in {1..20}; do
            STATE=$(gh codespace list --repo "A-A-Softs/g2ray" --json name,state -q ".[] | select(.name==\"$CODESPACE\") | .state")
            if [ "$STATE" = "Available" ]; then echo "Ready!"; break; fi
            sleep 15
          done

          # Make port 443 public (token has read:org, admin:public_key now)
          echo "Making port 443 public..."
          gh codespace ports visibility 443:public -c "$CODESPACE" --repo "A-A-Softs/g2ray" || echo "Port may already be public"

          # Start Xray (show-link.sh will be called inside start.sh)
          echo "Starting Xray..."
          gh codespace ssh -c "$CODESPACE" -- "bash /usr/local/bin/start.sh"

          # Extract the link from show-link.sh (it prints to stdout)
          echo "Retrieving VLESS link..."
          LINK=$(gh codespace ssh -c "$CODESPACE" -- "bash /usr/local/bin/show-link.sh" 2>/dev/null | grep -o 'vless://[^ ]*')
          if [ -z "$LINK" ]; then
            echo "Failed to get link automatically. Trying to read from /tmp/link or manual..."
            LINK=$(gh codespace ssh -c "$CODESPACE" -- "cat /tmp/link 2>/dev/null" | grep -o 'vless://[^ ]*')
          fi
          echo "VLESS link: $LINK"
          echo "$LINK" > vless-link.txt
          echo "### VLESS Config:" >> $GITHUB_STEP_SUMMARY
          echo "$LINK" >> $GITHUB_STEP_SUMMARY

      - name: Output final link
        if: env.CODESPACE_NAME != ''
        run: |
          echo "### Final VLESS Config:"
          cat vless-link.txt
