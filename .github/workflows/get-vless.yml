name: Get VLESS from Existing Codespace

on:
  workflow_dispatch:
    inputs:
      codespace_name:
        description: 'اسم Codespace (مثال: friendly-succotash-r6445g6x6rr2pvjw)'
        required: true

jobs:
  get-link:
    runs-on: ubuntu-latest
    steps:
      - name: Install gh
        run: |
          type -p gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update && sudo apt install -y gh)

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat << 'EOF' >> ~/.ssh/config
          Host *.ssh.github.com
            User codespace
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            LogLevel ERROR
          EOF

      - name: Auth
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh auth status || gh auth login --with-token <<< "${{ secrets.PAT_TOKEN }}"

      - name: Start Codespace if needed
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          NAME="${{ inputs.codespace_name }}"
          echo "Ensuring Codespace $NAME is running..."
          STATE=$(gh codespace list --repo "A-A-Softs/g2ray" --json name,state -q ".[] | select(.name==\"$NAME\") | .state")
          if [ "$STATE" != "Available" ]; then
            echo "Starting codespace..."
            gh codespace start -c "$NAME"
            # Wait until Available
            for i in {1..20}; do
              STATE=$(gh codespace list --repo "A-A-Softs/g2ray" --json name,state -q ".[] | select(.name==\"$NAME\") | .state")
              if [ "$STATE" = "Available" ]; then echo "Ready!"; break; fi
              sleep 10
            done
          else
            echo "Already running."
          fi

      - name: Public port, start Xray, get link
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          NAME="${{ inputs.codespace_name }}"
          echo "Making port 443 public..."
          gh codespace ports visibility 443:public -c "$NAME" --repo "A-A-Softs/g2ray"

          echo "Starting Xray and getting link..."
          # مهم: CODESPACE_NAME رو قبل از اجرا ست می‌کنیم تا لینک SNI درست داشته باشه
          OUTPUT=$(gh codespace ssh -c "$NAME" -- "export CODESPACE_NAME='$NAME'; bash /usr/local/bin/start.sh")
          echo "$OUTPUT"

          # استخراج لینک VLESS از خروجی
          LINK=$(echo "$OUTPUT" | grep -o 'vless://[^ ]*')
          if [ -z "$LINK" ]; then
            LINK=$(gh codespace ssh -c "$NAME" -- "export CODESPACE_NAME='$NAME'; bash /usr/local/bin/show-link.sh" 2>/dev/null | grep -o 'vless://[^ ]*')
          fi
          echo "VLESS link: $LINK"
          echo "$LINK" > vless-link.txt
          echo "### VLESS Config:" >> $GITHUB_STEP_SUMMARY
          echo "$LINK" >> $GITHUB_STEP_SUMMARY

      - name: Output final link
        run: |
          echo "### Final VLESS Config:"
          cat vless-link.txt
